version: 2

models:
  - name: stg_sales
    description: "Staged sales data — cleaned view of transformed_sales"
    columns:
      - name: id
        description: "Primary key"
        tests:
          - not_null
      - name: quantity
        description: "Number of units sold"
        tests:
          - not_null
      - name: unit_price
        description: "Price per unit"
        tests:
          - not_null
      - name: region
        description: "Sales region"
        tests:
          - not_null
          - accepted_values:
              values: ['North', 'South', 'East', 'West']
      - name: category
        description: "Product category"
        tests:
          - not_null
          - accepted_values:
              values: ['Electronics', 'Clothing', 'Food']