name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-task-management-api:
    name: Task Management API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: taskdb
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        working-directory: backend/task-management-api
        run: pip install greenlet==3.0.3 && pip install -r requirements.txt

      - name: Run tests
        working-directory: backend/task-management-api
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5433/taskdb
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256
          REDIS_HOST: localhost
          REDIS_URL: redis://localhost:6379
        run: pytest tests/ -v --cov=. --cov-report=term-missing

  test-etl-pipeline:
    name: ETL Pipeline Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        working-directory: backend/etl-pipeline
        run: pip install greenlet==3.0.3 && pip install multimethod==1.9.1 && pip install -r requirements.txt

      - name: Run tests
        working-directory: backend/etl-pipeline
        run: pytest tests/ -v